version: 1.0.0


environment:
  sdk: ^3.11.0
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  uuid: ^4.5.3
  provider: ^6.1.5+1
  archive: ^4.0.9
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/pim.png
